<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Spencer's Trade Evaluator</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f5;
    --text-muted: #8888a0;
    --text-dim: #55556a;
    --accent: #4f7fff;
    --accent-soft: rgba(79,127,255,0.12);
    --accent-glow: rgba(79,127,255,0.25);
    --green: #22c55e;
    --green-soft: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-soft: rgba(239,68,68,0.12);
    --yellow: #f59e0b;
    --yellow-soft: rgba(245,158,11,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 680px;
    margin: 0 auto;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header h1 span { color: var(--accent); }
  .header p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* MAIN */
  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* LOADING */
  #loading-screen {
    text-align: center;
    padding: 60px 20px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-screen p { color: var(--text-muted); font-size: 14px; }
  #loading-screen .load-step { margin-top: 8px; font-size: 12px; color: var(--text-dim); }

  /* SECTION LABELS */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 24px 0 10px;
  }

  /* TEAM SELECTOR */
  .team-selector {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 8px;
  }
  .team-selector label {
    font-size: 12px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 8px;
  }
  select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%238888a0' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    cursor: pointer;
  }
  select:focus { outline: none; border-color: var(--accent); }

  /* ROSTER DISPLAY */
  .roster-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 10px;
  }
  .roster-empty {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* PLAYER CARDS */
  .player-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .player-card:active { transform: scale(0.99); }
  .player-card.selected {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .player-card.selected .player-name { color: var(--accent); }
  .pos-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 6px;
    border-radius: 5px;
    min-width: 32px;
    text-align: center;
    flex-shrink: 0;
  }
  .pos-QB { background: rgba(79,127,255,0.2); color: #7aa3ff; }
  .pos-RB { background: rgba(34,197,94,0.2); color: #4ade80; }
  .pos-WR { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .pos-TE { background: rgba(168,85,247,0.2); color: #c084fc; }
  .pos-K  { background: rgba(107,114,128,0.2); color: #9ca3af; }
  .pos-DEF{ background: rgba(239,68,68,0.2); color: #f87171; }
  .pos-PICK { background: rgba(20,184,166,0.2); color: #2dd4bf; }
  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .player-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .player-val-display {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    min-width: 36px;
    text-align: right;
    display: none;
  }
  .comm-mode .player-val-display { display: block; }
  .player-card.selected .player-val-display { color: var(--accent); }
  .checkmark {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-hover);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .player-card.selected .checkmark {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkmark svg { display: none; }
  .player-card.selected .checkmark svg { display: block; }

  /* TRADE PANEL */
  .trade-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 8px;
  }
  .trade-side {
    margin-bottom: 16px;
  }
  .trade-side-title {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .trade-side-title span {
    font-size: 11px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 2px 7px;
    border-radius: 20px;
  }
  .selected-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 32px;
    align-items: flex-start;
  }
  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 10px 5px 8px;
    font-size: 12px;
    color: var(--text);
  }
  .chip-remove {
    font-size: 16px;
    color: var(--text-dim);
    cursor: pointer;
    line-height: 1;
    margin-left: 2px;
    padding: 0 1px;
  }
  .chip-remove:hover { color: var(--red); }
  .empty-chips {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    padding: 6px 0;
  }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  /* EVALUATE BTN */
  .eval-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 16px;
    transition: opacity 0.15s;
    letter-spacing: -0.2px;
  }
  .eval-btn:active { opacity: 0.85; }
  .eval-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* RESULT */
  #result-section { display: none; }
  .result-card {
    border-radius: var(--radius);
    padding: 22px 18px;
    margin-top: 20px;
    text-align: center;
    border: 1px solid;
  }
  .result-card.positive {
    background: var(--green-soft);
    border-color: rgba(34,197,94,0.25);
  }
  .result-card.neutral {
    background: var(--yellow-soft);
    border-color: rgba(245,158,11,0.25);
  }
  .result-card.negative {
    background: var(--red-soft);
    border-color: rgba(239,68,68,0.25);
  }
  .result-emoji { font-size: 36px; margin-bottom: 10px; }
  .result-message {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.4;
    letter-spacing: -0.3px;
  }
  .result-card.positive .result-message { color: #4ade80; }
  .result-card.neutral .result-message { color: #fbbf24; }
  .result-card.negative .result-message { color: #f87171; }

  /* COMMISSIONER VIEW */
  #commissioner-section { display: none; }
  .comm-gate {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: 20px;
    text-align: center;
  }
  .comm-gate h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
  .pw-row { display: flex; gap: 8px; max-width: 300px; margin: 0 auto; }
  input[type="password"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    font-size: 14px;
  }
  input[type="password"]:focus { outline: none; border-color: var(--accent); }
  .pw-btn {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    white-space: nowrap;
  }
  .pw-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pw-error { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }

  .comm-stats {
    display: none;
    margin-top: 16px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text-muted); }
  .stat-value { font-weight: 600; }
  .stat-value.pos { color: var(--green); }
  .stat-value.neg { color: var(--red); }
  .stat-value.neu { color: var(--yellow); }

  /* ERROR */
  .error-msg {
    background: var(--red-soft);
    border: 1px solid rgba(239,68,68,0.2);
    color: var(--red);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    margin-top: 8px;
    display: none;
  }

  /* MY TEAM SECTION */
  .my-team-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .refresh-btn {
    font-size: 12px;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
  }
  .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 3px;
    margin-bottom: 12px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 7px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--card);
    color: var(--text);
  }

  /* NOTE INPUT */
  .note-area {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14px;
    width: 100%;
    resize: none;
    margin-top: 10px;
    font-family: inherit;
  }
  .note-area:focus { outline: none; border-color: var(--accent); }


</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Spencer's <span>Trade Hub</span></h1>
    <p id="status-text"><span class="status-dot"></span>Loading league data...</p>
  </div>
</div>

<div class="main">

  <!-- LOADING -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p>Pulling live league data</p>
    <div class="load-step" id="load-step">Connecting to Sleeper...</div>
  </div>

  <!-- MAIN APP (hidden until loaded) -->
  <div id="app" style="display:none">

    <!-- MY TEAM -->
    <div class="section-label">
      <div class="my-team-header">
        <span>Spencer's Team</span>
        <button class="refresh-btn" onclick="refreshData()">↻ Refresh</button>
      </div>
    </div>
    <div class="team-selector">
      <div class="roster-grid" id="my-roster"></div>
    </div>

    <!-- FRIEND'S TEAM -->
    <div class="section-label" style="margin-top:20px">Their Team</div>
    <div class="team-selector">
      <label>Select a team to trade with</label>
      <select id="friend-team-select" onchange="loadFriendRoster()">
        <option value="">— Pick a team —</option>
      </select>
      <div class="roster-grid" id="friend-roster" style="margin-top:10px"></div>
    </div>

    <!-- TRADE BUILDER -->
    <div class="section-label" style="margin-top:20px">Build the Trade</div>
    <div class="trade-panel">
      <div class="trade-side">
        <div class="trade-side-title">
          You'd receive
          <span id="receive-count">0 selected</span>
        </div>
        <div class="selected-chips" id="receive-chips">
          <div class="empty-chips">Select players from their roster above</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="trade-side">
        <div class="trade-side-title">
          You'd give up
          <span id="give-count">0 selected</span>
        </div>
        <div class="selected-chips" id="give-chips">
          <div class="empty-chips">Select players from your roster above</div>
        </div>
      </div>
    </div>

    <!-- NOTE -->
    <textarea class="note-area" id="trade-note" rows="2" placeholder="Add a note with your proposal (optional)..."></textarea>

    <!-- EVALUATE -->
    <button class="eval-btn" id="eval-btn" onclick="evaluateTrade()">Evaluate This Trade</button>
    <div class="error-msg" id="eval-error"></div>

    <!-- RESULT -->
    <div id="result-section">
      <div class="result-card" id="result-card">
        <div class="result-emoji" id="result-emoji"></div>
        <div class="result-message" id="result-message"></div>
      </div>

      <!-- COMMISSIONER GATE -->
      <div id="commissioner-section">
        <div class="comm-gate" id="comm-gate">
          <h3>Commissioner View</h3>
          <div class="pw-row">
            <input type="password" id="comm-pw" placeholder="Enter password..." onkeydown="if(event.key==='Enter')checkPw()">
            <button class="pw-btn" onclick="checkPw()">Unlock</button>
          </div>
          <div class="pw-error" id="pw-error">Wrong password</div>
          <div class="comm-stats" id="comm-stats"></div>
        </div>
      </div>

      <!-- RESET -->
      <button class="eval-btn" style="background:var(--surface);color:var(--text);border:1px solid var(--border);margin-top:10px;" onclick="resetTrade()">
        ← Start a New Trade
      </button>
    </div>



  </div>
</div>

<script>
const LEAGUE_ID = '1312171038452248576';
const COMMISSIONER_PW = 'Edwards5!';
const SPENCER_NAME = 'Spencer';
const SPENCER_USERNAME = 'spillera21'; // exact Sleeper username

let allPlayers = {};
let dpValues = {};
let rosters = [];
let users = [];
let tradedPicks = [];
let spencerRosterId = null;
let spencerRoster = null;
let mySelectedGive = new Set();
let mySelectedReceive = new Set();
let currentFriendRosterId = null;
let commUnlocked = false;
let lastResultData = null;
let draftSlotMap = {}; // rosterId -> { round -> pickSlot } for current year

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    setLoadStep('Fetching live dynasty values...');
    await loadDynastyValues();

    setLoadStep('Loading league rosters...');
    await loadLeague();

    setLoadStep('Loading draft slots...');
    await loadDraftSlots();

    setLoadStep('Done!');
    await new Promise(r => setTimeout(r, 300));

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('status-text').innerHTML =
      `<span class="status-dot"></span>Live · ${users.length} teams · Your roster: ${spencerRoster.teamName}`;

    renderMyRoster();
    populateTeamDropdown();
  } catch(e) {
    document.getElementById('load-step').textContent = 'Error: ' + e.message;
    document.getElementById('load-step').style.color = '#ef4444';
    console.error(e);
  }
}

function setLoadStep(msg) {
  document.getElementById('load-step').textContent = msg;
}

// ── DATA LOADING ──────────────────────────────────────────────────────────
async function loadDynastyValues() {
  // Try FantasyCalc public API first — covers every rostered NFL player, updated weekly
  // superflex=true gives 2QB values; ppr=1 for full PPR
  try {
    const r = await fetch('https://api.fantasycalc.com/values/current?isDynasty=true&numQbs=2&ppr=1&numTeams=8');
    if (r.ok) {
      const data = await r.json();
      data.forEach(entry => {
        const p = entry.player;
        const key = normalizeName(p.name);
        dpValues[key] = {
          name: p.name,
          value: entry.value || 0,
          pos: p.position || '?',
          team: p.mayflowerTeam || '',
          age: p.age || null,
          sleeperId: p.sleeperId || null,
        };
        // Also index by sleeper ID for direct lookup
        if (p.sleeperId) dpValues['sid_' + p.sleeperId] = dpValues[key];
      });
      console.log('FantasyCalc loaded:', Object.keys(dpValues).length, 'players');
      return;
    }
  } catch(e) {
    console.warn('FantasyCalc API failed, using fallback:', e.message);
  }
  // Fallback: large embedded table
  dpValues = getEmbeddedValues();
}

function normalizeName(n) {
  return (n || '').toLowerCase()
    .replace(/[''`]/g,'')
    .replace(/jr\.?$|sr\.?$|ii$|iii$/,'')
    .replace(/[^a-z ]/g,'')
    .trim()
    .replace(/\s+/g,' ');
}

async function loadLeague() {
  // Step 1: look up Spencer's user_id by exact username
  let spencerUserId = null;
  try {
    const userResp = await fetch(`https://api.sleeper.app/v1/user/${SPENCER_USERNAME}`);
    if (userResp.ok) {
      const userData = await userResp.json();
      spencerUserId = userData.user_id;
    }
  } catch(e) { /* will fall back to name matching */ }

  const [rostersData, usersData, picksData] = await Promise.all([
    apiFetch(`league/${LEAGUE_ID}/rosters`),
    apiFetch(`league/${LEAGUE_ID}/users`),
    apiFetch(`league/${LEAGUE_ID}/traded_picks`)
  ]);

  rosters = rostersData;
  users = usersData;
  tradedPicks = picksData || [];

  // Map user_id to display info
  const userMap = {};
  users.forEach(u => {
    userMap[u.user_id] = {
      name: u.metadata?.team_name || u.display_name || 'Team',
      display: u.display_name
    };
    // Also capture Spencer's user_id from the league users list if lookup failed
    if (!spencerUserId && u.display_name?.toLowerCase() === SPENCER_USERNAME.toLowerCase()) {
      spencerUserId = u.user_id;
    }
  });

  // Attach user info to rosters
  rosters.forEach(r => {
    const u = userMap[r.owner_id] || {};
    r.teamName = u.name || ('Team ' + r.roster_id);
    r.displayName = u.display || '';
    r.ownerId = r.owner_id;
  });

  // Find Spencer's roster by user_id (most reliable) or fallback to name
  spencerRoster = spencerUserId
    ? rosters.find(r => r.owner_id === spencerUserId)
    : rosters.find(r =>
        (r.displayName || '').toLowerCase().includes('spiller') ||
        (r.teamName || '').toLowerCase().includes('spiller')
      );

  if (!spencerRoster) spencerRoster = rosters[0]; // last resort fallback
  spencerRosterId = spencerRoster.roster_id;

  // Load Sleeper player lookup (lightweight — only fetch once)
  await loadSleeperPlayers();
}

async function loadSleeperPlayers() {
  try {
    const r = await fetch('https://api.sleeper.app/v1/players/nfl');
    const data = await r.json();
    allPlayers = data;
  } catch(e) {
    allPlayers = {};
  }
}

async function loadDraftSlots() {
  // Fetch the current year's rookie/upcoming draft to get exact pick slots
  // slot_to_roster_id tells us which draft position (1-8) belongs to which roster
  try {
    const drafts = await apiFetch(`league/${LEAGUE_ID}/drafts`);
    const currentYear = new Date().getFullYear().toString();
    // Find the upcoming/in-progress rookie draft for this season
    const rookieDraft = drafts.find(d =>
      d.season === currentYear && d.status !== 'complete'
    ) || drafts.find(d => d.season === currentYear);

    if (!rookieDraft) return;

    const slotToRoster = rookieDraft.slot_to_roster_id || {};
    // Invert: rosterId -> slot number (1-8)
    const rosterToSlot = {};
    Object.entries(slotToRoster).forEach(([slot, rosterId]) => {
      rosterToSlot[rosterId] = parseInt(slot);
    });

    // Build draftSlotMap: rosterId -> pick slot number for current year
    draftSlotMap = rosterToSlot;
    console.log('Draft slots loaded:', draftSlotMap);
  } catch(e) {
    console.warn('Could not load draft slots:', e.message);
  }
}

async function apiFetch(path) {
  const r = await fetch(`https://api.sleeper.app/v1/${path}`);
  if(!r.ok) throw new Error('API error: ' + r.status);
  return r.json();
}

// ── PLAYER HELPERS ────────────────────────────────────────────────────────
function getPlayerInfo(pid) {
  const p = allPlayers[pid];
  if(!p) return { name: 'Unknown', pos: '?', team: 'FA', age: null };
  return {
    name: (p.full_name || p.first_name + ' ' + p.last_name).trim(),
    pos: p.fantasy_positions?.[0] || p.position || '?',
    team: p.team || 'FA',
    age: p.age || null
  };
}



function getPickTierLabel(round, season) {
  const yr = parseInt(season) || 2026;
  const now = new Date().getFullYear();
  const future = yr - now;
  const r = parseInt(round) || 1;
  if (r === 1 && future <= 1) return 'High value pick';
  if (r === 1) return 'Mid value pick';
  if (r === 2 && future <= 1) return 'Mid value pick';
  return 'Low value pick';
}

function getPlayerValue(pid) {
  // Try direct Sleeper ID lookup first (most accurate)
  const byId = dpValues['sid_' + pid];
  if (byId) return byId.value;

  const info = getPlayerInfo(pid);
  if (!info || info.name === 'Unknown') return 0;
  const key = normalizeName(info.name);

  // Exact name match
  const dp = dpValues[key];
  if (dp) return dp.value;

  // Fuzzy: last name + position match
  const lastName = normalizeName(info.name.split(' ').slice(-1)[0]);
  for (const k in dpValues) {
    if (k.startsWith('sid_')) continue;
    if (dpValues[k].pos === info.pos && k.includes(lastName) && Math.abs(k.length - key.length) <= 5) {
      return dpValues[k].value;
    }
  }
  return 0;
}

function getPickValue(pick) {
  const year = parseInt(pick.season) || 2026;
  const round = parseInt(pick.round) || 1;
  const currentYear = new Date().getFullYear();
  const leagueSize = pick.leagueSize || 8;

  // Year discount: picks 1yr out worth ~15% less, 2yr out ~28% less
  const yearsOut = Math.max(0, year - currentYear);
  const yearDiscount = yearsOut === 0 ? 0 : yearsOut === 1 ? 0.15 : 0.28;

  // Base values for 8-team superflex rookie draft by round
  const baseValues = { 1: 4800, 2: 2800, 3: 1600 };
  const base = baseValues[round] || 500;

  let slotMod = 1.0;
  if (pick.slotNum) {
    // Exact slot: top 2 picks are premium, bottom 2 are discounted
    const slot = pick.slotNum;
    if (slot <= 2)             slotMod = 1.35;
    else if (slot <= 4)        slotMod = 1.10;
    else if (slot <= 6)        slotMod = 0.90;
    else                       slotMod = 0.72;
  } else {
    // Unknown slot — treat as middle of the board
    slotMod = 1.0;
  }

  return Math.round(base * slotMod * (1 - yearDiscount));
}

function getPickLabel(pick) {
  const year = pick.season || '?';
  const round = parseInt(pick.round) || 1;
  const size = pick.leagueSize || 8;

  if (pick.slotNum) {
    // Format as R.SS — e.g. 1.06 for round 1 pick 6
    const slot = String(pick.slotNum).padStart(2, '0');
    const label = `${year} ${round}.${slot}`;
    // If it's a traded pick from another team, note who it came from
    if (!pick.isOwn && pick.originalTeamName) {
      return `${label} (via ${pick.originalTeamName})`;
    }
    return label;
  }

  // No slot known — show early/mid/late based on position within league
  // For future years we don't know standings yet so show round only
  const roundStr = `${year} Round ${round}`;
  if (!pick.isOwn && pick.originalTeamName) {
    return `${roundStr} (via ${pick.originalTeamName})`;
  }
  return roundStr;
}

function getFuturePicks(rosterId) {
  const currentYear = new Date().getFullYear();
  const leagueSize = rosters.length || 8;
  const picks = [];
  const seen = new Set();

  // Build full set of picks this roster owns (traded picks tell us ownership)
  // tradedPicks contains all picks that have been traded at least once
  const tradedToMe = new Set();
  const tradedAwayFromMe = new Set();

  tradedPicks.forEach(p => {
    const key = `${p.season}-${p.round}-${p.roster_id}`; // original team's pick
    if (p.owner_id === rosterId && parseInt(p.season) >= currentYear) {
      tradedToMe.add(key);
    }
    if (p.previous_owner_id === rosterId && parseInt(p.season) >= currentYear) {
      tradedAwayFromMe.add(key);
    }
  });

  // Each roster originally owns their own picks for each round/year
  // Add own picks that haven't been traded away
  const years = [currentYear, currentYear + 1, currentYear + 2];
  const rounds = [1, 2, 3]; // typical dynasty rookie draft rounds

  years.forEach(yr => {
    rounds.forEach(rnd => {
      const key = `${yr}-${rnd}-${rosterId}`;
      if (!tradedAwayFromMe.has(key) && !seen.has(key)) {
        seen.add(key);
        // Get exact slot if available (current year only)
        const slotNum = (yr === currentYear && draftSlotMap[rosterId]) ? draftSlotMap[rosterId] : null;
        picks.push({
          season: yr.toString(),
          round: rnd,
          slotNum,        // exact draft position (1-8) or null
          leagueSize,
          id: `pick_${key}`,
          originalRosterId: rosterId,
          isOwn: true
        });
      }
    });
  });

  // Add picks traded to this roster
  tradedPicks
    .filter(p => p.owner_id === rosterId && parseInt(p.season) >= currentYear)
    .forEach(p => {
      const key = `${p.season}-${p.round}-${p.roster_id}`;
      if (!seen.has(key)) {
        seen.add(key);
        // Get slot for the original owner if current year
        const slotNum = (parseInt(p.season) === currentYear && draftSlotMap[p.roster_id])
          ? draftSlotMap[p.roster_id] : null;
        const originalTeam = rosters.find(r => r.roster_id === p.roster_id);
        picks.push({
          season: p.season,
          round: p.round,
          slotNum,
          leagueSize,
          id: `pick_${key}`,
          originalRosterId: p.roster_id,
          originalTeamName: originalTeam?.teamName || null,
          isOwn: false
        });
      }
    });

  // Sort: current year first, then by round, then by slot
  picks.sort((a, b) => {
    if (a.season !== b.season) return parseInt(a.season) - parseInt(b.season);
    if (a.round !== b.round) return a.round - b.round;
    return (a.slotNum || 99) - (b.slotNum || 99);
  });

  return picks;
}

function sortRosterPlayers(players, forFriend) {
  const posOrder = { QB: 0, RB: 1, WR: 2, TE: 3, K: 4, DEF: 5 };
  return [...players].sort((a, b) => {
    const pa = getPlayerInfo(a), pb = getPlayerInfo(b);
    const po = (posOrder[pa.pos] ?? 6) - (posOrder[pb.pos] ?? 6);
    if(po !== 0) return po;
    return getPlayerValue(b) - getPlayerValue(a);
  });
}

  const posClass = `pos-${info.pos}`;

  card.innerHTML = `

    <div class="player-info">

    </div>

  `;

  card.addEventListener('click', () => togglePlayer(pid, side, card, info.name, val, 'player'));

    set.delete(pid);
    card.classList.remove('selected');

function updateChipsFor(side, set, container, counter) {
  counter.textContent = set.size + ' selected';
  if(set.size === 0) {
    container.innerHTML = `<div class="empty-chips">Select players ${side === 'give' ? 'from your roster above' : 'from their roster above'}</div>`;
    return;
  }
  container.innerHTML = '';

    if(isPick) {
      const card = document.querySelector(`[data-pid="${pid}"]`);
      name = card?.querySelector('.player-name')?.textContent || 'Pick';
      val = parseInt(card?.dataset?.val) || 0;
    } else {
      const info = getPlayerInfo(pid);
      name = info.name;
      val = getPlayerValue(pid);
    }

    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `<span>${name}</span><span class="chip-remove" data-pid="${pid}" data-side="${side}">×</span>`;
    chip.querySelector('.chip-remove').addEventListener('click', () => removeFromSet(pid, side));
    container.appendChild(chip);
  });
}

function removeFromSet(pid, side) {
  const set = side === 'give' ? mySelectedGive : mySelectedReceive;
  set.delete(pid);
  // Deselect card
  const card = document.querySelector(`.player-card[data-pid="${pid}"][data-side="${side}"]`);
  if(card) card.classList.remove('selected');
  updateChips();
}

// ── EVALUATE ──────────────────────────────────────────────────────────────
function evaluateTrade() {
  const errEl = document.getElementById('eval-error');
  errEl.style.display = 'none';

  if(mySelectedGive.size === 0 && mySelectedReceive.size === 0) {
    errEl.textContent = 'Select at least one player on each side of the trade.';
    errEl.style.display = 'block';
    return;
  }

  let giveTotal = 0, receiveTotal = 0;
  const giveItems = [], receiveItems = [];

  mySelectedGive.forEach(pid => {
    const isPick = pid.startsWith('pick_');
    let val, name;
    if(isPick) {
      const card = document.querySelector(`[data-pid="${pid}"][data-side="give"]`);
      val = parseInt(card?.dataset?.val) || 0;
      name = card?.querySelector('.player-name')?.textContent || 'Pick';
    } else {
      val = getPlayerValue(pid);
      name = getPlayerInfo(pid).name;
    }
    giveTotal += val;
    giveItems.push({ name, val });
  });

  mySelectedReceive.forEach(pid => {
    const isPick = pid.startsWith('pick_');
    let val, name;
    if(isPick) {
      const card = document.querySelector(`[data-pid="${pid}"][data-side="receive"]`);
      val = parseInt(card?.dataset?.val) || 0;
      name = card?.querySelector('.player-name')?.textContent || 'Pick';
    } else {
      val = getPlayerValue(pid);
      name = getPlayerInfo(pid).name;
    }
    receiveTotal += val;
    receiveItems.push({ name, val });
  });

  // Package adjustment: reward giving/getting a stud (similar to KTC)
  const giveMax = Math.max(...giveItems.map(x => x.val));
  const receiveMax = Math.max(...receiveItems.map(x => x.val));
  const giveDepth = giveTotal - giveMax;
  const receiveDepth = receiveTotal - receiveMax;

  // Slight depth penalty — multiple lesser players worth less than listed
  const giveAdjusted = giveMax + (giveDepth * 0.88);
  const receiveAdjusted = receiveMax + (receiveDepth * 0.88);

  // diff > 0 means Spencer profits (receives more value)
  const diff = Math.round(receiveAdjusted - giveAdjusted);

  lastResultData = { diff, giveTotal: Math.round(giveAdjusted), receiveTotal: Math.round(receiveAdjusted), giveItems, receiveItems };

  const { msg, emoji, style } = getVerdict(diff);

  const resultCard = document.getElementById('result-card');
  resultCard.className = 'result-card ' + style;
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-message').textContent = msg;

  document.getElementById('result-section').style.display = 'block';
  document.getElementById('commissioner-section').style.display = 'block';

  if(commUnlocked) {
    showCommStats();
  } else {
    document.getElementById('comm-gate').style.display = 'block';
    document.getElementById('comm-stats').style.display = 'none';
  }

  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function getVerdict(diff) {
  if(diff > 2000)  return { msg: "I think Spencer would be on board. Send it over and see what happens", emoji: '🤝', style: 'positive' };
  if(diff >= 1000) return { msg: "I think Spencer might like this. Worth giving him a call", emoji: '📞', style: 'positive' };
  if(diff >= 0)    return { msg: "Spencer might consider this, depending on his mood", emoji: '🤔', style: 'neutral' };
  if(diff >= -500) return { msg: "You're close, but Spencer's probably gonna want some more cream in his coffee", emoji: '☕', style: 'neutral' };
  if(diff >= -1000)return { msg: "Eh, probably not worth Spencer's time if I had to guess", emoji: '😐', style: 'negative' };
  if(diff >= -2000)return { msg: "I'd reckon this isn't worth the wasted breath", emoji: '🙅', style: 'negative' };
  return { msg: "Are you high? Or retarded? Or both?", emoji: '💀', style: 'negative' };
}

  const pw = document.getElementById('comm-pw').value;

  if(pw === COMMISSIONER_PW) {
    commUnlocked = true;
    errEl.style.display = 'none';

    document.getElementById('comm-pw').style.display = 'none';

    document.querySelector('.pw-row').style.display = 'none';
    // Show values on all player cards

      const v = parseInt(el.dataset.val) || 0;
      el.textContent = v > 0 ? v.toLocaleString() : '–';

    clearTimeout(autoLockTimer);
    autoLockTimer = setTimeout(lockComm, 10 * 60 * 1000);

    errEl.style.display = 'block';

function lockComm() {
  commUnlocked = false;
  document.body.classList.remove('comm-mode');

}
